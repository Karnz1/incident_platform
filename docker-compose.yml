services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: api

    restart: unless-stopped

    ports:
      - "8000:8000"

    depends_on:
      - pg_db
      - redis_db

    networks:
      - network-internal

  pg_db:
    image: postgres:15
    env_file:
      - ./app/.env
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - network-internal
    
  
  redis_db:
    image: redis:latest
    env_file:
      - ./app/.env
    volumes:
      - redis-data:/data
    networks:
      - network-internal
volumes:
  pg-data:
  redis-data:

networks:
  network-internal:
    driver: bridge

    