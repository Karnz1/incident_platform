name: Front CI

on:
  push:
    branches: [ main ]
    paths: 
      - "frontend/**"

jobs:
  pre-build:
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        working-directory: ./frontend    

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
            node-version: ${{ vars.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Run Unit Tests
        run: npm test
    
  build:
    needs: pre-build
    runs-on: ubuntu-latest
    environment: dev

    env:
      DOCKER_METADATA_SHORT_SHA_LENGTH: 7

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
                
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/incident-front
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=dev,enable={{is_default_branch}}
            type=raw,value=dev-{{sha}},enable={{is_default_branch}}
          labels: |
            date_created={{date 'DD-MM-YYYY HH:mm' tz='Asia/Jerusalem'}}
            owner=Michael
  
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
    
      - name: Set new image tag in helm config
        run: |
          export IMAGE_TAG="sha-${GITHUB_SHA::7}"
          yq -i '.frontend.image.tag = strenv(IMAGE_TAG)' k8s/inci-plat/values.yaml
          cat k8s/inci-plat/values.yaml
          git diff
    
