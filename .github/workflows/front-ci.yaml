name: Front CI

on:
  push:
    branches: [ main ]
    paths: 
      - "front/**"

jobs:
  pre-build:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
            node-version: '20'
            cache: npm

      - name: Install dependencies
        run: npm install

      - name: Run Unit Tests
        run: npx test

