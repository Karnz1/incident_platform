name: Front CI

on:
  push:
    branches: [ main ]
    paths: 
      - "frontend/**"

jobs:
  pre-build:
    runs-on: ubuntu-latest
    environment: dev

    defaults:
      run:
        working-directory: ./frontend    

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
            node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run linter
        run: npm run lint

      - name: Run Unit Tests
        run: npx test

