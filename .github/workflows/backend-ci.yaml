name: Backend CI / Lint - Test - Build - Push (Dev)

on:
  push:
    branches: [ main ]
    paths:
        - 'app/api/**'
jobs:
  pre-build:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: |
          ruff check ./app/api
        
      - name: Run tests
        run: |
          PYTHONPATH=./app pytest ./app/api
    
  build:
    needs: pre-build    
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
                
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/inci-plat:${{ github.sha }}
