name: Backend CI 
#/ Lint - Test - Build - Push (Dev)

on:
  push:
    branches: [ main ]
    paths:
        - 'app/api/**'

permissions:
  contents: read

concurrency:
  group: helm-values-update
  cancel-in-progress: false

jobs:
  pre-build:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: |
          ruff check ./app/api
        
      - name: Run tests
        run: |
          TESTING=1 PYTHONPATH=./app pytest ./app/api
    
  build:
    needs: pre-build    
    runs-on: ubuntu-latest
    environment: dev
    env:
      DOCKER_METADATA_SHORT_SHA_LENGTH: 7
    
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
                
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/incident-api
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=dev,enable={{is_default_branch}}
            type=raw,value=dev-{{sha}},enable={{is_default_branch}}
          labels: |
            date_created={{date 'DD-MM-YYYY HH:mm' tz='Asia/Jerusalem'}}
            owner=Michael
      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      
      - name: Set new image tag in helm config
        run: |
          export IMAGE_TAG="sha-${GITHUB_SHA::7}"
          yq -i '.api.image.tag = strenv(IMAGE_TAG)' k8s/inci-plat/values.yaml

      - name: Commit updated Helm values
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]"

          git add k8s/inci-plat/values.yaml
          git commit -m "UPDATED api image tag"
          git pull --rebase origin main && git push
