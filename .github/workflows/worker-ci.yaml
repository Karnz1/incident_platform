name: Worker CI

on:
  push:
    branches: [ main ]
    paths:
      - "app/worker/**"

jobs:
  pre-build:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ vars.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
         pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: |
          ruff check ./app/worker

      - name: Run unit tests
        run: |
          PYTHONPATH=. pytest ./app/worker/tests/test_worker.py
  
  build:
    needs: pre-build
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
                
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/incident-worker
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=dev,enable={{is_default_branch}}
            type=raw,value=dev-{{sha}},enable={{is_default_branch}}

          labels:
            date_created={{date 'DD-MM-YYYY HH:mm' tz='Asia/Jerusalem'}}
            owner=Michael

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
