apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{{ .Release.Name }}-ingress"
  annotations:
    nginx.ingress.kubernetes.io/limit-rps: {{ .Values.ingress.rps | default "10" | quote }}
spec:
  ingressClassName: nginx
  rules:
  - host: {{ .Values.ingress.hostname }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service: { name: front-clusterip, port: { number: 8080 } }
      
      - path: /api
        pathType: Prefix
        backend:
          service: { name: api-service, port: { number: 8000 } }