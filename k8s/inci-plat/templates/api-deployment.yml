apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    name: "{{ .Release.Name }}-api"
spec:
  selector:
    matchLabels:
      app: api
  replicas: 2
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          ports:
            containerPort: 8000


