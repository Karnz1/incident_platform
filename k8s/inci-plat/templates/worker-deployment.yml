apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    name: "{{ .Release.Name }}-worker"
spec:
  selector:
    matchLabels:
      app: worker
  replicas: 2
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: xazmo/inci_plat:worker-v1.0